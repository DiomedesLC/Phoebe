name: Release

on:
  release:
    types: [released]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: |
        dotnet restore
        dotnet tool restore

    - name: Build solution
      run: |
        dotnet build --no-restore --configuration Release

    - name: Publish Windows CLI
      run: |
        dotnet publish ./Phoebe.CLI --sc --os win -c Release -p:PublishSingleFile=true

    - name: Upload Windows CLI artifact
      uses: actions/upload-artifact@v4
      with:
        name: win-x64-cli
        path: ./Phoebe.CLI/bin/Release/win-x64/publish/Phoebe.CLI.exe

    - name: Upload Nuget artifact
      uses: actions/upload-artifact@v4
      with:
        name: nupkg-build
        path: ./*/bin/Release/*.nupkg